# nfsctl default configuration
# Override by placing a copy at /etc/nfsctl/defaults.conf

# Default NFS export options
DEFAULT_EXPORT_OPTIONS="rw,sync,no_subtree_check"

# Default client (who can access exports)
# Use a private subnet rather than "*" (world) for safety
DEFAULT_CLIENT="10.0.0.0/8"

# Default export path
DEFAULT_EXPORT_PATH="/srv/nfs"

# NFS server packages
NFS_SERVER_PACKAGES="nfs-kernel-server nfs-common"

# NFS client packages
NFS_CLIENT_PACKAGES="nfs-common"

# NFS services
NFS_SERVER_SERVICE="nfs-kernel-server"

# NFS ports (for firewall)
NFS_PORT=2049
MOUNTD_PORT=20048
RPCBIND_PORT=111

# Lock file for concurrent access
LOCK_FILE="/var/lock/nfsctl.lock"

# Exports file
EXPORTS_FILE="/etc/exports"

# Managed tag
MANAGED_TAG="# Managed by nfsctl"

# Backup directory
BACKUP_DIR="/var/backups/nfsctl"
